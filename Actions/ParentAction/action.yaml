name: Parent Action
author: Microsoft Corporation
description: This is a parent action that calls a child action

runs:
  using: composite
  steps:
    - name: Say hi
      shell: powershell
      env:
        actionRepo: ${{ github.action_repository }}
        actionPath: ${{ github.action_path }}
        actionRef: ${{ github.action_ref }}
      run: |
        Write-Host "Hello from the Parent Action"
        Write-Host "Current action path: ${{ env.actionPath }}"
        Write-Host "Current action repository: ${{ env.actionRepo }}"
        Write-Host "Current action ref: ${{ env.actionRef }}"

        # Add action repo and ref to environment variables
        Add-Content $env:GITHUB_ENV "ACTION_REPO=${{ env.actionRepo }}"
        Add-Content $env:GITHUB_ENV "ACTION_REF=${{ env.actionRef }}"

    #Checkout the action repo
    - name: Checkout action repository
      uses: actions/checkout@v4
      with:
        repository: ${{ env.ACTION_REPO }}
        ref: ${{ env.ACTION_REF }}
        path: './_AL-Go'
        lfs: true

    #Call child action from the same repository
    - name: Say hi from a child action
      uses: ./_AL-Go/Actions/ChildAction
      with:
        who: 'Parent Action'

branding:
  icon: terminal
  color: blue
