name: Parent Action
author: Microsoft Corporation
description: This is a parent action that calls a child action

runs:
  using: composite
  steps:
    - name: Set action repository and ref
      shell: powershell
      env:
        actionRepo: ${{ github.action_repository }}
        actionRef: ${{ github.action_ref }}
      run: |
        $actionsRepo = "${{ env.actionRepo }}"
        $actionsRef = "${{ env.actionRef }}"
        Write-Host "Current action repository: $actionsRepo"
        Write-Host "Current action ref: $actionsRef"

        # Set the path where the actions will be checked out

        # Default path is ./_AL-Go/Actions
        $actionsPath = './_AL-Go/Actions'
        if ($actionsRepo -like '*/AL-Go') { # direct development
          # Set the path one level up as that where the Actions folder will be
          $actionsPath = './_AL-Go'
        }

        Add-Content $env:GITHUB_ENV "ACTION_REPO=$actionsRepo" -Encoding UTF8
        Add-Content $env:GITHUB_ENV "ACTION_REF=$actionsRef" -Encoding UTF8
        Add-Content $env:GITHUB_ENV "ACTIONS_PATH=$actionsPath" -Encoding UTF8

    #Checkout the action repo
    - name: Checkout action repository
      uses: actions/checkout@v4
      with:
        repository: ${{ env.ACTION_REPO }}
        ref: ${{ env.ACTION_REF }}
        path: ${{ env.ACTIONS_PATH }}

    #Call child action from the same repository
    - name: Say hi from a child action
      uses: ./_AL-Go/Actions/ChildAction
      with:
        who: 'Parent Action'

branding:
  icon: terminal
  color: blue
